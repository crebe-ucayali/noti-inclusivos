<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="titulo descripcion">
  <title id="titulo">Imagen predeterminada de Notiinclusivo</title>
  <desc id="descripcion">Fondo institucional azul y verde con patrón geométrico inspirado en identidad visual amazónica.</desc>
  <defs>
    <linearGradient id="fondo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3550"/>
      <stop offset="0.52" stop-color="#0f4f57"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <pattern id="patron" width="160" height="120" patternUnits="userSpaceOnUse">
