name: Actualizar noticias RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-noticias-rss
  cancel-in-progress: false

jobs:
  actualizar-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generar noticias RSS
        run: |
          node scripts/actualizar-rss.js
          mkdir -p data
          mv noticias-rss.json data/noticias-rss.json

      - name: Guardar cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualizar noticias RSS"
          file_pattern: data/noticias-rss.json
