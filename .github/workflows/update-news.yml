name: Actualizar noticias inclusivas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generar noticias en data
        run: |
          python scripts/update_news.py
          mkdir -p data
          mv noticias.json data/noticias.json

      - name: Confirmar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/noticias.json
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Actualizar noticias inclusivas"
          git push
