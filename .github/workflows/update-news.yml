name: Actualizar noticias inclusivas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

concurrency:
  group: actualizar-noticias
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generar noticias principales
        run: |
          python scripts/update_news.py
          mkdir -p data
          mv noticias.json data/noticias.json

      - name: Guardar cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualizar noticias inclusivas"
          file_pattern: data/noticias.json
